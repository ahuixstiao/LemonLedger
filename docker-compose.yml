version: '3.8'

services:
  lemonledger:
    image: 794862853/lemonledger:1.2
    container_name: lemonledger_container
    expose:
      - "8080"  # 内部端口
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/ledger?useUnicode=true&serverTimezone=GMT%2B8&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: jeesite      # 本地 MySQL 用户
      SPRING_DATASOURCE_PASSWORD: root  # 本地 MySQL 密码
    networks:
      - my_network
    restart: always

