#      - my_network
#    restart: always

#  adminer:
#    image: adminer
#    container_name: adminer_container
#    ports:
#      - "8081:8080"
#    networks:
#      - my_network
#    depends_on:
#      - mysql
#    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_container
    ports:
      - "8080:80"  # 外部访问端口
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ledger-view/dist:/usr/share/nginx/html  # 前端打包文件
    depends_on:
      - lemonledger
    networks:
      - my_network
    restart: always

networks:
  my_network:
    name: lemonledger_network
    driver: bridge